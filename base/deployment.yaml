apiVersion: apps/v1
kind: Deployment
metadata:
  name: crater-app
  labels:
    app.kubernetes.io/name: crater-app
    app.kubernetes.io/component: server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: crater-app
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crater-app
        app.kubernetes.io/component: server
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: link-storage
          image: drgrovellc/crater-app
          command:
            - php
          args:
            - artisan
            - storage:link
        - name: key-generate
          image: drgrovellc/crater-app
          command:
            - php
          args:
            - artisan
            - key:generate
      containers:
        - name: app
          image: drgrovellc/crater-app
          securityContext:
            allowPrivilegeEscalation: false
        - name: nginx
          image: drgrovellc/crater-app-nginx
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/php-fpm.conf
              subPath: php-fpm.conf
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config

