apiVersion: apps/v1
kind: Deployment
metadata:
  name: crater-app
  labels:
    app.kubernetes.io/name: crater-app
    app.kubernetes.io/component: server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: crater-app
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crater-app
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: app
          image: invoiceshelf/invoiceshelf
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 80
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config

